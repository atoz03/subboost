name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "ryan/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.19.0"
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run check:local-app
